version: '3.8'

services:
  # ---- 后端：FastAPI ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recruit-backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/db
      - app_logs:/app/logs
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./db/recruiting_agent.db
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gpt-4o}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    networks:
      - recruit-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- 前端：nginx ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recruit-frontend
    ports:
      - "3030:80"
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    networks:
      - recruit-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sqlite_data:
  app_logs:

networks:
  recruit-net:
    driver: bridge
